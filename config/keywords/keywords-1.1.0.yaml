schema_version: "1.0"

dictionary:
  id: observatorio_educacion_superior_youtube
  version: "1.1.0"
  status: active
  language: es
  created_at: "2026-07-14"
  updated_at: "2026-07-15"
  purpose: >-
    Descubrir videos sobre percepcion y oferta de educacion superior mediante
    terminos trazables por indicador, concepto, pais e intencion de busqueda.
  scope: universidades e instituciones de educacion superior

provenance:
  - id: annotation_guide_v1
    type: project_document
    path: "../../../../docs/Guía de anotación para videos de YouTube (1).docx"
  - id: scraping_protocol_v1
    type: project_document
    path: "../../../../docs/PROTOCOLO_SCRAPEO_EQUIPO.md"
  - id: initial_lexical_seed
    type: expert_seed
    description: Primera expansion contextual para validacion del equipo.
  - id: natural_queries_v1
    type: experiment_profile
    description: Frases completas y de alta intencion seleccionadas como diccionario activo.

countries:
  - code: AR
    label: Argentina
  - code: BR
    label: Brasil
  - code: CL
    label: Chile
  - code: CO
    label: Colombia
  - code: MX
    label: Mexico
  - code: PE
    label: Peru

statuses:
  - seed
  - candidate
  - validated
  - rejected

source_types:
  - official
  - third_party

intents:
  - id: informational
    label: Informacion
    description: Busca datos, caracteristicas o explicaciones.
  - id: procedural
    label: Procedimiento
    description: Busca pasos, requisitos, fechas o tramites.
  - id: experiential
    label: Experiencia
    description: Busca relatos personales y vida cotidiana.
  - id: opinion
    label: Opinion
    description: Busca valoraciones, ventajas o desventajas.
  - id: comparison
    label: Comparacion
    description: Contrasta instituciones, programas o alternativas.
  - id: problem
    label: Problema
    description: Busca dificultades, reclamos o aspectos negativos.

normalization:
  lowercase: true
  strip_diacritics_for_matching: true
  collapse_whitespace: true
  preserve_original_value: true
  deduplicate_queries: true

intent_modifiers:
  informational:
    global:
      - informacion
      - todo sobre
      - como es
  procedural:
    global:
      - como ingresar
      - requisitos
      - paso a paso
      - fechas
  experiential:
    global:
      - mi experiencia
      - un dia en
      - primer semestre
      - vida de estudiante
  opinion:
    global:
      - opinion
      - vale la pena
      - lo mejor y lo peor
      - cosas que nadie te dice
  comparison:
    global:
      - comparacion
      - versus
      - cual es mejor
  problem:
    global:
      - problemas
      - dificultades
      - reclamo
      - lo malo de

indicators:
  - id: ingreso
    label: Ingreso
    definition: Procesos para postular, ser admitido e inscribirse en la institucion.
    concepts:
      - id: matricula
        label: Matricula
        definition: Inscripcion formal del estudiante o de sus asignaturas.
      - id: admision
        label: Admision
        definition: Requisitos, evaluacion, postulacion y resultados de ingreso.

  - id: dinero
    label: Dinero
    definition: Costos de estudio y mecanismos de apoyo economico.
    concepts:
      - id: costo
        label: Costo
        definition: Pagos, aranceles, cuotas y otros gastos de estudio.
      - id: beca
        label: Beca
        definition: Becas, gratuidad, creditos y ayudas economicas.

  - id: programas
    label: Programas
    definition: Oferta formativa, carreras y estudios posteriores al grado.
    concepts:
      - id: carrera
        label: Carrera
        definition: Carreras, planes de estudio, asignaturas y perfiles formativos.
      - id: postgrado
        label: Postgrado
        definition: Maestrias, doctorados, especializaciones y diplomados.

  - id: calidad
    label: Calidad
    definition: Percepcion sobre la formacion academica y el desempeno docente.
    concepts:
      - id: calidad_academica
        label: Calidad academica
        definition: Nivel, exigencia, prestigio, acreditacion y calidad de ensenanza.
      - id: docente
        label: Docente
        definition: Profesores, practicas de ensenanza y calidad docente.

  - id: vida_campus
    label: Vida y campus
    definition: Espacios, servicios y experiencia social dentro de la institucion.
    concepts:
      - id: infraestructura
        label: Infraestructura
        definition: Campus, aulas, laboratorios, bibliotecas y servicios fisicos.
      - id: vida_universitaria
        label: Vida universitaria
        definition: Actividades, comunidad, ambiente y participacion estudiantil.

  - id: experiencia
    label: Experiencia
    definition: Formas de estudio y testimonios personales sobre la institucion.
    concepts:
      - id: modalidad
        label: Modalidad
        definition: Estudio presencial, virtual, hibrido, semipresencial o a distancia.
      - id: testimonio
        label: Testimonio
        definition: Relato u opinion personal basada en experiencia directa.

