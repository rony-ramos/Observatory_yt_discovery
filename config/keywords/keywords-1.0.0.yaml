ambiguity_rules:
  - id: matricula_ingreso_vs_costo
    term_ids: [ingreso.matricula.inscripcion]
    description: Matricula puede representar inscripcion o un pago obligatorio.
    when_any: [precio, costo, pagar, arancel, cuota, valor]
    action: remap
    target:
      indicator: dinero
      concept: costo

  - id: ingreso_vs_ingreso_economico
    term_ids: [ingreso.admision.postulacion]
    description: Ingreso aislado puede referirse a salario o ingresos economicos.
    when_any: [salario, sueldo, ganancias, ingresos economicos]
    unless_any: [universidad, admision, postulacion, estudiante]
    action: exclude

  - id: calidad_multimedia
    term_ids: [calidad.calidad_academica.nivel]
    description: Calidad puede describir el audio o video y no la educacion.
    when_any: [calidad de video, calidad de audio, resolucion, 1080p, 4k]
    action: exclude

  - id: experiencia_no_estudiantil
    term_ids: [experiencia.testimonio.relato]
    description: Experiencia puede ser laboral y no una vivencia universitaria.
    when_any: [experiencia laboral, experiencia profesional, anos de experiencia]
    unless_any: [estudiante, universidad, carrera, semestre, campus]
    action: exclude

